<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="author" content="Низаев Булат">
    <meta name="copyright" content="© Низаев Булат, 2026">
    <title>Оплата 200 ₽ · rtwhrt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.7;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 3;
            max-width: 450px;
            width: 90%;
            margin: 20px auto;
            padding: 20px;
        }

        .payment-card {
            background: rgba(20, 20, 25, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 2rem 1.8rem;
            animation: fadeIn 0.5s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .price {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 2rem;
            text-shadow: 0 0 15px rgba(255, 220, 100, 0.3);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 1.1rem;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 40px;
            color: #ffd966;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .pay-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd966;
            color: #fff3d1;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .check-btn {
            background: rgba(100, 150, 255, 0.12);
            border-color: rgba(100, 150, 255, 0.5);
            color: #aac8ff;
        }

        .check-btn:hover {
            background: rgba(100, 150, 255, 0.25);
            border-color: #aac8ff;
            color: #d0e0ff;
        }

        .telegram-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .telegram-hint a {
            color: #aac8ff;
            text-decoration: none;
            border-bottom: 1px dotted;
        }

        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
            margin-top: 0.5rem;
        }

        .back-link:hover {
            color: white;
        }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            user-select: none;
        }

        .sound-toggle:hover {
            background: rgba(40, 40, 50, 0.7);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .payment-card { padding: 1.8rem 1.5rem; }
            h1 { font-size: 1.8rem; }
            .price { font-size: 2.8rem; }
            .pay-btn { font-size: 1.1rem; padding: 1rem; }
            .sound-toggle { bottom: 16px; right: 16px; width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video" poster="assets/oplata-preview.jpg">
    <source src="assets/video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="content">
    <div class="payment-card">
        <h1>ОПЛАТА</h1>
        <div class="price">200 ₽</div>
        <div class="buttons">
            <a href="https://pay.ruks.me/redirect.php?shop_id=3732&amount=200&order_id=1&c=RUB&sign=d05f08e3aacf0bbae59646b3f8ca85f9ef1225ff753f1d2c8a9139c06e17fae5" target="_blank" class="pay-btn">💳 Оплатить</a>
            <a href="https://t.me/durov_in_tatarstan" target="_blank" class="pay-btn check-btn">📤 Отправить чек</a>
        </div>
        <div class="telegram-hint">
            Если не работает — напишите <a href="https://t.me/durov_in_tatarstan" target="_blank">@durov_in_tatarstan</a>
        </div>
        <div style="margin-top: 1.5rem;">
            <a href="vpr.html" class="back-link">← Назад к ВПР</a>
        </div>
    </div>
</div>

<audio id="bgMusic" loop preload="metadata">
    <source src="assets/main-bg.mp3" type="audio/mpeg">
</audio>

<div class="sound-toggle" id="soundToggle" title="Включить звук">🔇</div>

<script>
    (function() {
        "use strict";

        const video = document.getElementById('bg-video');
        video.addEventListener('error', () => {
            video.style.display = 'none';
            console.warn('Видео не найдено.');
        });

        const music = document.getElementById('bgMusic');
        const soundToggle = document.getElementById('soundToggle');
        let isMuted = true;

        function resetSoundUI() {
            music.muted = true;
            music.pause();
            music.currentTime = 0;
            isMuted = true;
            soundToggle.textContent = '🔇';
            soundToggle.title = 'Включить звук';
        }

        music.muted = true;
        music.volume = 0.4;
        soundToggle.textContent = '🔇';
        soundToggle.title = 'Включить звук';

        function toggleSound() {
            if (isMuted) {
                music.muted = false;
                music.play().then(() => {
                    isMuted = false;
                    soundToggle.textContent = '🔊';
                    soundToggle.title = 'Выключить звук';
                }).catch(err => {
                    console.warn('Автовоспроизведение заблокировано. Нажмите ещё раз.');
                    music.muted = true;
                    soundToggle.title = 'Нажмите для включения звука';
                });
            } else {
                resetSoundUI();
            }
        }

        soundToggle.addEventListener('click', e => {
            e.stopPropagation();
            toggleSound();
        });

        function stopMusic() {
            if (music && !music.paused) {
                music.pause();
                music.currentTime = 0;
            }
        }

        window.addEventListener('beforeunload', stopMusic);
        document.querySelectorAll('a').forEach(link => link.addEventListener('click', stopMusic));

        window.addEventListener('pageshow', event => {
            if (event.persisted) resetSoundUI();
        });

        window.addEventListener('load', () => {
            music.muted = true;
            music.play().catch(() => {});
        });
    })();
</script>

</body>
</html>
